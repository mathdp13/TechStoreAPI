services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5082:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/techstore.db
    volumes:
      - techstore_data:/app/data

volumes:
  techstore_data: