services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5082:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/techstore.db
    volumes:
      - techstore_data:/app/data

  frontend:
    image: nginx:alpine
    ports:
      - "5500:80"
    volumes:
      - .:/usr/share/nginx/html
    depends_on:
      - api

volumes:
  techstore_data: